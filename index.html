<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Yandex Games SDK — до бандла; тег обязателен для требований Яндекса -->

    <link rel="stylesheet" href="/fonts/local-fonts.css" />

      html,

        background: #080c14;

      }
      .avia-boot {
        display: flex;
        align-items: center;

        min-height: 100dvh;

        opacity: 0.85;

  <body>
    <noscript>
      <strong>
        Для работы приложения нужен включённый JavaScript.
